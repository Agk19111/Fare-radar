name: Fare Radar scan and deploy

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fare-radar-pages
  cancel-in-progress: false

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan deal feeds
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python scanner.py

      - name: Save scanner state
        run: |
          git config user.name "fare-radar-bot"
          git config user.email "actions@github.com"
          git add seen.json deals.json
          git diff --cached --quiet || git commit -m "Update fare feed [skip ci]"
          git push || true

      - name: Build static site artifact
        run: |
          mkdir -p _site
          cp index.html deals.json _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
